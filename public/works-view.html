<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Works — Personal Universe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="works-view.css" />
  </head>
  <body>
    <!-- Fixed Back Button -->
    <a class="back-btn" href="index.html" id="backBtn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Back</span>
    </a>

    <!-- Fixed Close Button -->
    <button class="close-btn" id="closeBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>

    <!-- Custom Scrollbar -->
    <div class="scrollbar" id="scrollbar">
      <div class="scrollbar-thumb" id="scrollbarThumb"></div>
    </div>

    <!-- Entry overlay -->
    <div class="s-entry" id="sEntry">
      <div class="s-entry-content">
        <span class="s-entry-line"></span>
        <span class="s-entry-label">Works</span>
        <span class="s-entry-line"></span>
      </div>
    </div>

    <!-- The 3D Work Scene (scrollable tall section) -->
    <section class="s-work" id="sWork">
      <!-- Mask SVG (decorative ring) -->
      <div class="s-mask-wrap">
        <svg class="s-mask-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <ellipse class="s-mask-outer" cx="50" cy="50" rx="48" ry="40" fill="none" stroke="rgba(244,12,63,0.08)" stroke-width="0.3"/>
          <ellipse class="s-mask-inner-ellipse" cx="50" cy="50" rx="46" ry="38" fill="none" stroke="rgba(244,12,63,0.15)" stroke-width="0.15"/>
        </svg>
      </div>

      <!-- Fixed inner scene -->
      <div class="s-inner" id="sInner">
        <!-- Title -->
        <h2 class="s-title" id="sTitle">
          <span class="s-title-inner" id="sTitleInner"></span>
        </h2>

        <!-- 3D Scene -->
        <div class="s-scene" id="sScene">
          <!-- Letters and work items injected by JS -->
        </div>
      </div>
    </section>

    <script src="works-view.js"></script>
  </body>
</html>
